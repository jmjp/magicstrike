version: "3.8"

services:
  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:latest
    container_name: clickhouse-db
    environment:
      - CLICKHOUSE_DB=magicstrike
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=test
    ports:
      - "9000:9000"
      - "8123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: always

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  minio:
    image: docker.io/minio/minio:latest
    container_name: minio-storage
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

  rabbitmq:
    image: docker.io/rabbitmq:3-management
    container_name: rabbitmq-broker
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  postgres:
    image: docker.io/postgres:16-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=magicstrike
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magicstrike-api
    command: /app/api
    depends_on:
      - clickhouse
      - qdrant
      - minio
      - rabbitmq
      - postgres
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=change-me-in-production
      - CLICKHOUSE_ADDR=clickhouse:9000
      - CLICKHOUSE_DB=magicstrike
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=test
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=magicstrike-demos
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_EXCHANGE=demo_uploads
      - RABBITMQ_QUEUE=demo_processing
      - RABBITMQ_ROUTING_KEY=demo.upload
      - DEEPSEEK_API_KEY=
      - VOYAGE_API_KEY=
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=magicstrike
      - POSTGRES_SSLMODE=disable
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magicstrike-worker
    command: /app/worker -mode consumer
    depends_on:
      - clickhouse
      - qdrant
      - minio
      - rabbitmq
      - postgres
    environment:
      - CLICKHOUSE_ADDR=clickhouse:9000
      - CLICKHOUSE_DB=magicstrike
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=test
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=magicstrike-demos
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_EXCHANGE=demo_uploads
      - RABBITMQ_QUEUE=demo_processing
      - RABBITMQ_ROUTING_KEY=demo.upload
      - DEEPSEEK_API_KEY=
      - VOYAGE_API_KEY=
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=magicstrike
      - POSTGRES_SSLMODE=disable
    restart: always

volumes:
  qdrant_data:
  minio_data:
  postgres_data:
